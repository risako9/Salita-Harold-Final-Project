<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Inventory Admin Dashboard</title>
  <style>
    body { background: #f5f7fb; }
    .navbar-brand { font-weight: 600; }
    .low-stock { background: #fff3cd; }
    .out-stock { background: #f8d7da; }
    .dashboard-card { border: 0; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-info">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">Shoe Store</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="inventory.html">Inventory Admin</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
      <div>
        <h1 class="h3 mb-1">Inventory Admin Dashboard</h1>
        <p class="text-muted mb-0">Search, add, delete, replenish, and monitor limited stocks.</p>
      </div>
      <div class="d-flex gap-2 align-items-center">
        <span class="badge bg-warning text-dark fs-6">Limited stock: <span id="limited-count">0</span></span>
        <button id="reset-inventory-btn" class="btn btn-sm btn-outline-secondary">Reset Stock</button>
      </div>
    </div>

    <div class="card dashboard-card mb-4">
      <div class="card-body">
        <div class="row g-3">
          <div class="col-12 col-md-6">
            <label for="inventory-search" class="form-label">Search products</label>
            <input type="search" id="inventory-search" class="form-control" placeholder="Search by shoe name...">
          </div>
          <div class="col-12 col-md-6 d-flex align-items-end">
            <button id="show-limited-btn" class="btn btn-outline-warning w-100">Show limited stocks only</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card dashboard-card mb-4">
      <div class="card-body">
        <h2 class="h5 mb-3">Add New Product</h2>
        <form id="add-product-form" class="row g-3">
          <div class="col-12 col-md-4">
            <input type="text" id="product-name" class="form-control" placeholder="Product name" required>
          </div>
          <div class="col-6 col-md-3">
            <input type="number" id="product-price" class="form-control" placeholder="Price" min="1" required>
          </div>
          <div class="col-6 col-md-3">
            <input type="number" id="product-stock" class="form-control" placeholder="Stock" min="0" required>
          </div>
          <div class="col-12 col-md-2">
            <button class="btn btn-primary w-100" type="submit">Add</button>
          </div>
        </form>
      </div>
    </div>

    <div class="card dashboard-card">
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-info">
              <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Status</th>
                <th class="text-end">Action</th>
              </tr>
            </thead>
            <tbody id="inventory-table"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="inventory.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
